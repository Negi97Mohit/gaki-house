# netlify.toml

[build]
  # This command builds your Vite app for production
  command = "npm run build"
  # Vite's output directory is 'dist'
  publish = "dist"

[functions]
  directory = "netlify/functions"

[dev]
  framework = "vite"
  # This is the command to run your Vite dev server
  command = "npm run dev"
  # The port your Vite server runs on
  targetPort = 5173
  # The port Netlify will expose for your local dev environment
  port = 8888
  autoLaunch = false

# API Proxy Redirect
[[redirects]]
  from = "/api/apertus/*"
  to = "https://api.publicai.co/:splat"
  status = 200
  force = true

# Kick API Proxy (bypasses Cloudflare via server-side function)
[[redirects]]
  from = "/api/kick/*"
  to = "/.netlify/functions/kick-proxy?path=/:splat"
  status = 200
  force = true

# DLive GraphQL API Proxy (bypasses CORS)
[[redirects]]
  from = "/api/dlive"
  to = "https://graphigo.prd.dlive.tv/"
  status = 200
  force = true

# This redirect rule is ESSENTIAL for Single-Page Applications (SPAs) like React.
# It ensures that refreshing the page on a route like '/dashboard' doesn't result in a 404 error.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200